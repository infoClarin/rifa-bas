<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rifa Escolar</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            max-width: 1000px;
            margin: auto;
        }

        .number {
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .available {
            background: #4caf50;
            color: white;
        }

        .pending {
            background: #ffc107;
            color: black;
        }

        .reserved {
            background: #f44336;
            color: white;
        }

        .modal {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
            display: none;
            z-index: 1000;
        }

        .modal input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .actions button {
            flex: 1;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>Rifa Escolar</h1>

    <div class="legend">
        <span>🟢 Disponible</span>
        <span>🟡 Pendiente</span>
        <span>🔴 Reservado</span>
    </div>

    <div class="grid" id="grid"></div>

    <div class="modal" id="modal">
        <h2 id="modalTitle"></h2>

        <input type="text" id="name" placeholder="Nombre" />
        <input type="text" id="phone" placeholder="Teléfono" />

        <div class="actions">
            <button onclick="reserve()">Reservar</button>
            <button onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uitbrhbqcpdkmnksohll.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_gHJLZ-iv4M8NnHQA_pUqjg_rYMY6w7U'

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        let reservations = []
        let selectedNumber = null

        async function loadReservations() {
            const { data } = await supabaseClient
                .from('reservations')
                .select('*')

            reservations = data || []

            renderGrid()
        }

        function getStatus(number) {
            const reservation = reservations.find(r => r.number === number)

            if (!reservation) return 'available'

            return reservation.status
        }

        function renderGrid() {
            const grid = document.getElementById('grid')

            grid.innerHTML = ''

            for (let i = 1; i <= 180; i++) {
                const status = getStatus(i)

                const button = document.createElement('button')

                button.innerText = i
                button.className = `number ${status}`

                if (status !== 'available') {
                    button.disabled = true
                }

                button.onclick = () => openModal(i)

                grid.appendChild(button)
            }
        }
        function openModal(number) {
            selectedNumber = number

            document.getElementById('modalTitle').innerText = `Reservar número ${number}`
            document.getElementById('modal').style.display = 'block'
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none'
        }

        async function reserve() {
            const name = document.getElementById('name').value
            const phone = document.getElementById('phone').value

            if (!name || !phone) {
                alert('Completar datos')
                return
            }

            const { error } = await supabaseClient
                .from('reservations')
                .insert([
                    {
                        number: selectedNumber,
                        name,
                        phone,
                        status: 'pending'
                    }
                ])

            if (error) {
                alert('Número no disponible')
                return
            }

            alert('Solicitud enviada')

            closeModal()

            document.getElementById('name').value = ''
            document.getElementById('phone').value = ''

            loadReservations()
        }

        loadReservations()
    </script>
</body>

</html>
